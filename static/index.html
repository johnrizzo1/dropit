<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C9Z8NQ33SG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C9Z8NQ33SG');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverser</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="main-nav">
    <a class="nav-brand" href="/"><span>&gt;</span> Reverser</a>
    <div class="nav-links">
      <a href="/" class="active">Home</a>
      <a href="/results.html">All Runs</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="nav-action" onclick="openUploadModal()">Submit Binary</button>
  </nav>

  <div class="hero" id="hero">
    <h2>Automated Binary Analysis</h2>
    <p>AI-powered reverse engineering in isolated containers. Drop a binary and get results.</p>
  </div>

  <div class="container">
    <div id="showcase"><div class="loading">Loading latest analysis...</div></div>
  </div>

  <!-- Upload modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Submit Binary for Analysis</h3>
        <button class="modal-close" onclick="closeUploadModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="drop-zone">
          <div class="dz-icon">&#9655;</div>
          <p>Drop binary here or click to browse</p>
          <p class="dz-hint">Max 10 MB per file</p>
        </div>
        <input type="file" id="file-input" multiple>
        <div id="captcha-container" style="display:none;justify-content:center;margin-top:1rem"></div>
        <div id="upload-progress"></div>
      </div>
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/shared.js"></script>
  <script>
    initUploadModal();
    loadShowcase();

    async function loadShowcase() {
      const box = document.getElementById('showcase');
      try {
        const resp = await fetch('/api/runs');
        const data = await resp.json();

        if (!data.runs || data.runs.length === 0) {
          box.innerHTML = `<div class="empty-state">
            No analyses yet. <a href="#" onclick="openUploadModal();return false" style="color:#e94560">Submit a binary</a> to get started.
          </div>`;
          return;
        }

        // Pick a random run
        const run = data.runs[Math.floor(Math.random() * data.runs.length)];
        const name = run.name;
        const binaryName = parseBinaryName(name);

        // Update hero
        document.getElementById('hero').innerHTML += `<div class="binary-label">${esc(binaryName)}</div>`;

        // Load files and session
        const filesResp = await fetch(`/api/runs/${encodeURIComponent(name)}/files`);
        const filesData = await filesResp.json();
        const files = filesData.files || [];

        const sessionFile = files.find(f => f.name === 'session.jsonl');
        let events = [];
        if (sessionFile) {
          events = await fetchSessionEvents(sessionFile.key);
        }

        let html = '';

        // Pills
        const pillsHTML = buildPillsHTML(events);
        if (pillsHTML) html += `<div class="info-pills">${pillsHTML}</div>`;

        // Terminal first
        if (events.length > 0) {
          html += buildTerminalHTML(events, `reverser session — ${binaryName}`);
        }

        // Results highlight below
        const statusMd = await fetchStatusMd(files);
        html += buildResultsHighlightHTML(events, statusMd);

        // Files
        html += buildFilesHTML(files);

        box.innerHTML = html;

      } catch (err) {
        box.innerHTML = '<div class="empty-state">Failed to load analysis data.</div>';
        console.error(err);
      }
    }
  </script>
</body>
</html>
