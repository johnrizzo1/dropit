services:
  dropit:
    build: .
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=8080
      - REDIS_URL=127.0.0.1:6379
    depends_on:
      valkey:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    network_mode: host
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    volumes:
      - valkey_data:/data

volumes:
  valkey_data:
